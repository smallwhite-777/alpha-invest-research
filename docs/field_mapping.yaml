    - original: F040203B
      english: f040203b
      chinese: 应收账款周转率C
      description: 计算公式为：营业收入／应收账款平均占用额；当分母未公布或为零或小于零时、分子小于零时以NULL表示；应收账款平均占用额=（应收账款期末余额+应收账款上年期末余额）/2
    - original: F040204B
      english: f040204b
      chinese: 应收账款周转率D
      description: 计算公式为：调整因子*（营业收入）／（应收账款净额）平均余额；应收账款净额平均余额=（应收账款净额期末余额+应收账款净额上年期末余额）/2；调整因子和（营业收入，利润表科目）会计期间相关（即是：开始日期、截止日期的月份差额）；即是：12/(间隔月份)。比如，一季度为：12/3；前6个月：12/6,；1到9月份：12/9，全年：1；下同；当分母未公布或为零或小于零时、分子小于零时以NULL表示
    - original: F040205C
      english: f040205c
      chinese: 应收账款周转率TTM
      description: 计算公式为：（营业收入）TTM／（应收账款净额）平均余额；应收账款净额平均余额=（应收账款净额本期期末值+应收账款净额上年同期期末值）/2；（营业收入）TTM，是指上市公司过去12个月的累计营业收入；A科目TTM=A科目本期值+A科目上年年报值-A科目上年同期数据。如果，本期就是年报数据，那么，A科目TTM=A科目本期值；当分母未公布或为零或小于零时、分子小于零时以NULL表示
    - original: F040301B
