  income_statement:
    count: 68
    fields:
    - original: B001100000
      english: b001100000
      chinese: 营业总收入
      description: 企业经营过程中所有收入之和。 计算公式为：营业总收入=营业收入+利息净收入+已赚保费+手续费及佣金净收入+其他业务收入。
    - original: B001101000
      english: b001101000
      chinese: 营业收入
      description: 企业经营过程中确认的营业收入。
    - original: B0i1103000
      english: b0i1103000
      chinese: 已赚保费
      description: 反映"保险业务收入"项目金额减去"分出保费"及“提取未到期责任准备金”项目金额后的余额。
    - original: B0i1103101
      english: b0i1103101
      chinese: 保险业务收入
      description: 反映企业从事保险业务确认的原保费收入和分保费收入。
    - original: B0i1103111
      english: b0i1103111
      chinese: 其中：分保费收入
      description: 反映企业从事再保险业务确认的收入。
    - original: B0i1103203
      english: b0i1103203
      chinese: 减：分出保费
      description: 反映企业从事再保险业务分出的保费。
    - original: B0i1103303
      english: b0i1103303
      chinese: 减：提取未到期责任准备金
      description: 企业（保险）提取的非寿险原保险合同未到期责任准备金和再保险合同分保未到期责任准备金。
    - original: B0d1104000
      english: b0d1104000
      chinese: 手续费及佣金净收入
      description: 企业确认的手续费及佣金收入与发生的各项手续费、佣金支出之差额。
    - original: B0d1104101
      english: b0d1104101
      chinese: 其中：代理买卖证券业务净收入
      description: 证券公司代理买卖证券业务收入与支出之差额。
    - original: B0d1104201
      english: b0d1104201
      chinese: 其中:证券承销业务净收入
      description: 证券公司证券承销业务收入与支出之差额。
    - original: B0d1104301
      english: b0d1104301
      chinese: 其中：受托客户资产管理业务净收入
      description: 证券公司受托客户资产管理业务收入与支出之差额。
    - original: B0d1104401
      english: b0d1104401
      chinese: 手续费及佣金收入
      description: 企业（金融）确认的手续费及佣金收入，包括办理结算业务、咨询业务、担保业务、代保管等代理业务以及办理受托贷款及投资业务等取得的手续费及佣金.
    - original: B0d1104501
      english: b0d1104501
      chinese: 手续费及佣金支出
      description: 企业（金融）发生的与其经营活动相关的各项手续费、佣金等支出。
    - original: B0f1105000
      english: b0f1105000
      chinese: 其他业务收入
      description: 企业经营的其他业务所确认的收入。
    - original: B001200000
      english: b001200000
      chinese: 营业总成本
      description: 企业经营过程中所有成本之和。2019.06.30之前，计算公式为：营业总成本=营业成本+退保金+赔付支出净额+提取保险责任准备金净额+保单红利支出+分保费用-减：摊回分保费用+税金及附加+业务及管理费+保险业务手续费及佣金支出+销售费用+管理费用+财务费用+研发费用+其他业务成本+资产减值损失+信用减值损失；2019.06.30（含）之后：计算公式为：营业总成本=营业成本+退保金+赔付支出净额+提取保险责任准备金净额+保单红利支出+分保费用-减：摊回分保费用+税金及附加+业务及管理费+保险业务手续费及佣金支出+销售费用+管理费用+财务费用+研发费用+其他业务成本；其中，2019.01.01的数据因提取的是2019.12.31的期初数据，所以计算公式符合2019.06.30之后的计算公式。
    - original: B001201000
      english: b001201000
      chinese: 营业成本
      description: 企业确认的营业成本。
    - original: B0i1202000
      english: b0i1202000
      chinese: 退保金
      description: 企业（保险）寿险原保险合同提前解除时按照约定应当退还投保人的保单现金价值。
    - original: B0i1203000
      english: b0i1203000
      chinese: 赔付支出净额
      description: 反映“赔付支出”项目金额减去“摊回赔付支出”项目金额后的余额。
    - original: B0i1203101
      english: b0i1203101
      chinese: 赔付支出
      description: 企业（保险）支付的原保险合同赔付款项和再保险合同赔付款项。
    - original: B0i1203203
      english: b0i1203203
      chinese: 减：摊回赔付支出
      description: 企业（再保险分出人）向再保险接受人摊回的赔付成本。
    - original: B0i1204000
      english: b0i1204000
      chinese: 提取保险责任准备金净额
      description: 反映“提取保险责任准备金”项目金额减去“摊回保险责任准备金”项目金额后的余额。
    - original: B0i1204101
      english: b0i1204101
      chinese: 提取保险责任准备金
      description: 反映企业提取的保险责任准备金，包括未决赔款准备金、寿险准备金、长期健康险准备金。
    - original: B0i1204203
      english: b0i1204203
      chinese: 减：摊回保险责任准备金
      description: 企业（再保险分出人）从事再保险业务应向再保险接受人摊回的保险责任准备金。
    - original: B0i1205000
      english: b0i1205000
      chinese: 保单红利支出
      description: 企业（保险）按原保险合同约定支付给投保人的红利.
    - original: B0i1206000
      english: b0i1206000
      chinese: 分保费用
      description: 企业（再保险接受人）向再保险分出人支付的分保费用。
    - original: B001207000
      english: b001207000
      chinese: 税金及附加
      description: 企业经营活动发生的营业税、消费税、城市维护建设税、资源税和教育费附加等相关税费。2007年新准则后取消“主营业务税金及附加”，使用“营业税金及附加”。根据财会[2016]22号文规定，全面试行“营业税改征增值税”后，“营业税金及附加”科目名称调整为“税金及附加”科目。
    - original: B0f1208000
      english: b0f1208000
      chinese: 业务及管理费
      description: 是企业（金融）在业务经营和管理过程中所发生的各项费用，包括电子设备运转费、安全防范费、物业管理费等费用。
    - original: B0i1208103
      english: b0i1208103
      chinese: 减：摊回分保费用
      description: 反映企业从事再保险分出业务向再保险接受人摊回的分保费用。
    - original: B0I1214000
      english: b0i1214000
      chinese: 保险业务手续费及佣金支出
      description: 反映企业从事保险业务产生的手续费及佣金支出。
    - original: B001209000
      english: b001209000
      chinese: 销售费用
      description: 公司商品销售过程中发生的费用。包括运输费、装卸费、包装费、保险费、展览费和广告费等。
    - original: B001210000
      english: b001210000
      chinese: 管理费用
      description: 企业为组织和管理企业生产经营所发生的管理费用。2007年新准则后原管理费用的资产减值损失列入“资产减值损失”科目核算。
    - original: B001216000
      english: b001216000
      chinese: 研发费用
      description: 研发费用也就是研究开发成本支出。2018年起使用。
    - original: B001211000
      english: b001211000
      chinese: 财务费用
      description: 公司为筹集生产经营所需资金等而发生的费用，包括利息支出(减利息收入)、汇兑损失(减汇兑收益)以及相关的手续费等。
    - original: B001211101
      english: b001211101
      chinese: 其中：利息费用(财务费用)
      description: 企业在生产经营中进行债权性融资支付的资金占用费用。2018年起使用。
    - original: B001211203
      english: b001211203
      chinese: 其中：利息收入(财务费用)
      description: 企业将资金提供给他人使用但不构成权益性投资，或者因他人占用本企业资金取得的收入，包括存款利息、贷款利息、债券利息、欠款利息等收入。2018年起使用。
    - original: B001305000
      english: b001305000
      chinese: 其他收益
      description: 用于核算与企业日常活动相关、但不宜确认收入或冲减成本费用的政府补助。2017年起使用。
    - original: B001302000
      english: b001302000
      chinese: 投资收益
      description: 公司以各种方式对外投资所取得的收益。2007年新准则后原投资收益的资产减值损失列入“资产减值损失”科目核算。1991年起使用
    - original: B001302101
      english: b001302101
      chinese: 其中：对联营企业和合营企业的投资收益
      description: 本期公司对联营企业和合营企业的投资收益。
    - original: B001302201
      english: b001302201
      chinese: 其中：以摊余成本计量的金融资产终止确认收益
      description: 反映企业因转让等情形导致终止确认以摊余成本计量的金融资产而产生的利得或损失。2019年起使用。
    - original: B001303000
      english: b001303000
      chinese: 汇兑收益
      description: 企业（金融）发生的外币交易因汇率变动而产生的汇兑收益。
    - original: B001306000
      english: b001306000
      chinese: 净敞口套期收益
      description: 反映净敞口套期下被套期项目累计公允价值变动转入当期损益的金额或现金流量套期储备转入当期损益的金额。2019年起使用。
    - original: B001301000
      english: b001301000
      chinese: 公允价值变动收益
      description: 企业交易性金融资产、交易性金融负债，以及采用公允价值模式计量的投资性房地产、衍生工具、套期保值业务等公允价值变动形成的应计入当期损益的利得或损失。
    - original: B001212000
      english: b001212000
      chinese: 资产减值损失
      description: 企业计提各项资产减值准备所形成的损失。
    - original: B001307000
      english: b001307000
      chinese: 信用减值损失
      description: 企业因购货人拒付、破产、死亡等原因无法收回，而遭受的损失。2019年起使用。
    - original: B001308000
      english: b001308000
      chinese: 资产处置收益
      description: 反映企业出售划分为持有待售的非流动资产（金融工具、长期股权投资和投资性房地产除外）或处置组时确认的处置利得或损失，以及处置未划分为持有待售的固定资产、在建工程、生产性生物资产及无形资产而产生的处置利得或损失。债务重组中因处置非流动资产产生的利得或损失和非货币性资产交换产生的利得或损失也包括在本项目内。2017年起使用。
    - original: B0f1213000
      english: b0f1213000
      chinese: 其他业务成本
      description: 企业经营的其他业务所发生的成本。
    - original: B001304000
      english: b001304000
      chinese: 其他业务利润
      description: 公司除主营业务以外其他销售或其他业务取得的收入，扣除其他业务成本、费用、税金后的利润。1990年起使用，2007年停用。
    - original: B001300000
      english: b001300000
      chinese: 营业利润
      description: 与经营业务有关的利润。2019.06.30之前，计算公式为：营业利润=营业总收入-营业总成本+公允价值变动收益+投资收益+汇兑收益+其他业务利润+其他收益+净敞口套期收益+资产处置收益。2019.06.30之后计算公式为：营业利润=营业总收入-营业总成本+公允价值变动收益+投资收益+汇兑收益+其他业务利润+其他收益+净敞口套期收益+资产处置收益+资产减值损失+信用减值损失。其中，2019.01.01的数据因提取的是2019.12.31的期初数据，所以计算公式符合2019.06.30之后的计算公式。
    - original: B001400000
      english: b001400000
      chinese: 加：营业外收入
      description: 本科目核算企业发生的各项营业外收入，主要包括非流动资产处置利得、非货币性资产交换利得、债务重组利得、政府补助、盘盈利得、捐赠利得等。1990年起使用
    - original: B001400101
      english: b001400101
      chinese: 其中：非流动资产处置利得
      description: 包括固定资产处置利得和无形资产出售利得。2015年起使用。
    - original: B001500000
      english: b001500000
      chinese: 减：营业外支出
      description: 企业发生的各项营业外支出，包括非流动资产处置损失、非货币性资产交换损失、债务重组损失、公益性捐赠支出、非常损失、盘亏损失等。1990年起使用。2007年新准则后原营业外支出的资产减值损失列入“资产减值损失”科目核算。
    - original: B001500101
      english: b001500101
      chinese: 其中：非流动资产处置净损益
      description: 年度内处置非流动资产产生的净损益合计。 2007年起使用。计算公式为：其中：非流动资产处置净损益=其中：非流动资产处置损失-其中：非流动资产处置利得
    - original: B001500201
      english: b001500201
      chinese: 其中：非流动资产处置损失
      description: 包括固定资产处置损失和无形资产出售损失。2015年起使用。
    - original: B001000000
      english: b001000000
      chinese: 利润总额
      description: 公司实现的利润总额。1990年起使用。计算公式为：利润总额=营业利润+营业外收入-营业外支出
    - original: B002100000
      english: b002100000
      chinese: 减：所得税费用
      description: 企业确认的应从当期利润总额中扣除的所得税费用。
    - original: B002200000
      english: b002200000
      chinese: 未确认的投资损失
      description: 在按权益法核算长期投资项目的情况下，编制合并报表时，如被投资企业的所有者权益为负数时，公司应承担的被投资企业负所有者权益之份额。1998年起使用，2007年停用。
    - original: B002300000
      english: b002300000
      chinese: 影响净利润的其他项目
      description: 影响净利润的其他项目。
    - original: B002000000
      english: b002000000
      chinese: 净利润
      description: 公司实现的净利润。注：1990年起使用，1994年前部分公司无此项。
    - original: B002000101
      english: b002000101
      chinese: 归属于母公司所有者的净利润
      description: 合并报表净利润中归属于母公司所有者的净利润。2007年起使用。
    - original: B002000301
      english: b002000301
      chinese: 归属于母公司其他权益工具持有者的净利润
      description: 归属于母公司的子公司发行累积优先股等其他权益工具产生的净利润。2018年起使用。
    - original: B002000201
      english: b002000201
      chinese: 少数股东损益
      description: 子公司年度损益中按少数股东所持有的公司股权比例计算的应属少数股东享有的利润或分担的亏损。1991年起使用。
    - original: B003000000
      english: b003000000
      chinese: 基本每股收益
      description: 企业应当按照归属于普通股股东的当期净利润，除以发行在外普通股的加权平均数计算基本每股收益。 2007年起使用。
    - original: B004000000
      english: b004000000
      chinese: 稀释每股收益
      description: 企业存在稀释性潜在普通股的，应当分别调整归属于普通股股东的当期净利润和发行在外普通股的加权平均数，并据以计算稀释每股收益。 2007年起使用。
    - original: B005000000
      english: b005000000
      chinese: 其他综合收益(损失)
      description: 根据企业会计准则规定未在损益中确认的各项利得和损失扣除所得税影响后的净额。2009年开始使用。
    - original: B006000000
      english: b006000000
      chinese: 综合收益总额
      description: 综合收益是指除所有者的出资额和各种为第三方或客户代收的款项以外的各种收入。2009年开始使用。
    - original: B006000101
      english: b006000101
      chinese: 归属于母公司所有者的综合收益
      description: 综合收益中归属于母公司所有者享有的部分。2009年开始使用。
    - original: B006000103
      english: b006000103
      chinese: 归属于母公司其他权益工具持有者的综合收益总额
      description: 综合收益中归属于母公司其他权益工具持有者的部分。
    - original: B006000102
      english: b006000102
      chinese: 归属少数股东的综合收益
      description: 少数股东按照权益比例在综合损益中所占用的利润分配。2009年开始使用。IfCorrect [是否发生差错更正] - 会计期间内是否发生差错更正。0：否；1：是
