      description: 计算公式为：（经营活动产生的现金流量净额）/（营业总收入）；分母未公布或为零或小于零时，以NULL表示
    - original: F060301C
      english: f060301c
      chinese: 营业收入现金净含量TTM
      description: 计算公式为：（经营活动产生的现金流量净额）TTM/（营业总收入）TTM；分母未公布或为零或小于零时，以NULL表示
    - original: F060401B
      english: f060401b
      chinese: 营业利润现金净含量
      description: 计算公式为：（经营活动产生的现金流量净额）/（营业利润）；分母未公布或为零或小于零时，以NULL表示
    - original: F060401C
      english: f060401c
      chinese: 营业利润现金净含量TTM
      description: 计算公式为：（经营活动产生的现金流量净额）TTM/（营业利润）TTM；分母未公布或为零或小于零时，以NULL表示
    - original: F060901B
      english: f060901b
      chinese: 筹资活动债权人现金净流量
      description: 计算公式为：发行债券收到的现金+取得借款收到的现金+收到其他与筹资活动有关的现金—偿还债务支付的现金—支付其他与筹资活动有关的现金；各项目为空，零值代替。
    - original: F060901C
      english: f060901c
      chinese: 筹资活动债权人现金净流量TTM
      description: 计算公式为：（发行债券收到的现金+取得借款收到的现金+收到其他与筹资活动有关的现金—偿还债务支付的现金—支付其他与筹资活动有关的现金）TTM；各项目为空，零值代替。
    - original: F061001B
      english: f061001b
      chinese: 筹资活动股东现金净流量
      description: 计算公式为：吸收权益性投资收到的现金—分配股利、利润或偿付利息支付的现金；各项目为空，零值代替。
    - original: F061001C
      english: f061001c
      chinese: 筹资活动股东现金净流量TTM
      description: 计算公式为：（吸收权益性投资收到的现金—分配股利、利润或偿付利息支付的现金）TTM；各项目为空，零值代替。
    - original: F061201B
      english: f061201b
      chinese: 折旧摊销
      description: 计算公式为：（固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销）；各项目为空，零值代替。
    - original: F061201C
      english: f061201c
      chinese: 折旧摊销TTM
      description: 计算公式为：（固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销）TTM；各项目为空，零值代替。
    - original: F061301B
      english: f061301b
      chinese: 公司现金流1
      description: 计算公式为：净利润+财务费用—（资产总计）本期变动额+（货币资金）本期变动额—（负债合计）本期变动额—（吸收权益性投资收到的现金—分配股利、利润或偿付利息支付的现金）；A本期变动额=A本期期末值—A上年年末值；各项目为空，零值代替。
    - original: F061302B
      english: f061302b
      chinese: 公司现金流2
      description: 计算公式为：现金及现金等价物净增加额—筹资活动产生的现金流量净额；各项目为空，零值代替。
    - original: F061301C
      english: f061301c
      chinese: 公司现金流TTM1
      description: 计算公式为：净利润TTM+财务费用TTM-（资产总计）本期变动额TTM+（货币资金）本期变动额TTM—（负债合计）本期变动额TTM—（吸收权益性投资收到的现金—分配股利、利润或偿付利息支付的现金）TTM；A本期变动额=A本期期末值—A上年同期期末值；各项目为空，零值代替。
    - original: F061302C
      english: f061302c
      chinese: 公司现金流TTM2
      description: 计算公式为：现金及现金等价物净增加额TTM—筹资活动产生的现金流量净额TTM；各项目为空，零值代替。
    - original: F061401B
      english: f061401b
      chinese: 股权现金流1
      description: 计算公式为：净利润-（所有者权益合计）本期变动额-（吸收权益性投资收到的现金-分配股利、利润或偿付利息支付的现金）+（货币资金）本期变动额；A本期变动额=A本期期末值—A上年年末值；各项目为空，零值代替。
    - original: F061402B
      english: f061402b
      chinese: 股权现金流2
      description: 计算公式为：（现金及现金等价物净增加额）-（吸收权益性投资收到的现金—分配股利、利润或偿付利息支付的现金）
    - original: F061401C
      english: f061401c
      chinese: 股权现金流TTM1
      description: 计算公式为：净利润TTM-（所有者权益合计）本期变动额TTM-（吸收权益性投资收到的现金-分配股利、利润或偿付利息支付的现金）TTM+（货币资金）本期变动额TTM；A本期变动额=A本期期末值—A上年同期期末值
    - original: F061402C
      english: f061402c
      chinese: 股权现金流TTM2
      description: 计算公式为：（现金及现金等价物净增加额）TTM-（吸收权益性投资收到的现金-分配股利、利润或偿付利息支付的现金）TTM
    - original: F061501B
      english: f061501b
      chinese: 公司自由现金流(原有)
      description: 计算公式为：（净利润+所得税费用+财务费用）*（净利润）/（净利润+所得税费用）+固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销-筹资活动产生的现金流量净额-（流动资产合计-流动负债合计）本期变动额
    - original: F061601B
      english: f061601b
      chinese: 股权自由现金流(原有)
      description: 计算公式为：净利润+固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销-筹资活动产生的现金流量净额-（流动资产合计—流动负债合计）本期变动额—偿还债务支付的现金+发行债券收到的现金
    - original: F061701B
      english: f061701b
      chinese: 全部现金回收率
      description: 计算公式为：（经营活动产生的现金流量净额）/（资产总计）期末余额；分母各项目为空，以零取代；分母合计值为零，结果以NULL表示。
    - original: F061801B
      english: f061801b
      chinese: 营运指数
      description: 计算公式为：（经营活动产生的现金流量净额）/（净利润-投资收益-公允价值变动收益-营业外收入+营业外支出+固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销+递延所得税资产减少+递延所得税负债增加）
    - original: F061901B
      english: f061901b
      chinese: 资本支出与折旧摊销比
      description: 计算公式为：（购建固定资产、无形资产和其他长期资产支付的现金）/（固定资产折旧、油气资产折耗、生产性生物资产折旧+无形资产摊销+长期待摊费用摊销）
    - original: F062001B
      english: f062001b
      chinese: 现金适合比率
      description: 计算公式为：（经营活动产生的现金流量净额）/（购建固定资产、无形资产和其他长期资产支付的现金+分配股利、利润或偿付利息支付的现金+存货净额本期变动额）；资产负债表本期变动额=期末值—上年年末值
    - original: F062101B
      english: f062101b
      chinese: 现金再投资比率
      description: 计算公式为：（经营活动产生的现金流量净额）/（固定资产净额+持有至到期投资净额+长期债权投资净额+长期股权投资净额+流动资产合计-流动负债合计）
    - original: F062201B
      english: f062201b
      chinese: 现金满足投资比率
      description: 计算公式为：（经营活动产生的现金流量净额）近5年之和/（购建固定资产、无形资产和其他长期资产支付的现金+分配股利、利润或偿付利息支付的现金+存货净额本期变动额）近5年之和；如果，不足五年则按实际年数计算。
    - original: F062301B
      english: f062301b
      chinese: 股权自由现金流
      description: 计算公式为：（净利润+非现金支出）—营运资本追加—资本性支出—债务本金偿还+新发行债务
    - original: F062401B
      english: f062401b
      chinese: 企业自由现金流
      description: 计算公式为：息前税后利润+折旧与摊销-营运资本增加-资本支出
